# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

include:
  - configs.yml

services:
  quantum:
    image: gtstef/filebrowser:stable
    entrypoint: ["/bin/sh", "/init.sh"]
    logging:
      <<: *logging
    stop_grace_period: 30s
    environment:
      - DOMAIN_PUBLIC=${DOMAIN_PUBLIC}
      - FILEBROWSER_DATABASE=/quantum/data.db
      - FILEBROWSER_CONFIG=/quantum/config.yaml
      - FILEBROWSER_ADMIN_USERNAME=${FILEBROWSER_ADMIN_USERNAME}
      - FILEBROWSER_ADMIN_PASSWORD=${FILEBROWSER_ADMIN_PASSWORD}
      - FILEBROWSER_OIDC_CLIENT_ID=${FILEBROWSER_OIDC_CLIENT_ID}
      - FILEBROWSER_JWT_TOKEN_SECRET=${FILEBROWSER_JWT_TOKEN_SECRET}
      - FILEBROWSER_OIDC_CLIENT_SECRET=${FILEBROWSER_OIDC_CLIENT_SECRET}
    configs:
      - source: quantum_config
        target: /tmp/config.yaml.tpl
      - source: quantum_init
        target: /init.sh
    networks:
      - infra_gw-internal
    volumes:
      - quantum-data:/quantum
      - /mnt/personal:/mnt/personal
      - /mnt/apple:/mnt/apple:ro
      - /mnt/photos:/mnt/photos
      - /mnt/media:/mnt/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      <<: [*place-storage, *deploy]
      update_config:
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.quantum.rule=Host(`files.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.quantum.entrypoints=websecure"
        - "traefik.http.services.quantum.loadbalancer.server.port=8080"
        - "homepage.group=Applications"
        - "homepage.name=Quantum"
        - "homepage.icon=filebrowser-quantum"
        - "homepage.href=https://files.${DOMAIN_PRIVATE}"
        - "homepage.description=File Management"
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-medium

volumes:
  quantum-data:

networks:
  infra_gw-internal:
    external: true
