# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest-fat
    logging:
      <<: *logging
    stop_grace_period: 30s
    environment:
      - PUID=${GLOBAL_NONROOT_PUID}
      - PGID=${GLOBAL_NONROOT_PGID}
      - SHOW_SURVEY=false
      - DISABLE_ADDITIONAL_FEATURES=false

      - SYSTEM_ENABLEANALYTICS=false
      - SYSTEM_DEFAULTLOCALE=en-US
      - SYSTEM_FRONTENDURL=https://pdf.${DOMAIN_PRIVATE}
      - SYSTEM_CORSALLOWEDORIGINS=https://pdf.${DOMAIN_PRIVATE}
      - SYSTEM_SERVERCERTIFICATE_ORGANIZATIONNAME=${DOMAIN_PUBLIC}
      - SYSTEM_GOOGLEVISIBILITY=false
      - SYSTEM_SHOWUPDATE=true
      - SYSTEM_SHOWUPDATEONLYADMIN=true
      - SYSTEM_MAXFILESIZE=2000
      - SYSTEM_ENABLEURLTOPDF=true
      - SYSTEM_ENABLEMOBILESCANNER=true
      - SYSTEM_ENABLEDESKTOPINSTALLSLIDE=false
      - SYSTEM_ENABLEALPHAFUNCTIONALITY=true
      - SYSTEM_SHOWSETTINGSWHENNOLOGIN=false

      - UI_APPNAME=Stirling PDF
      - UI_APPNAMENAVBAR=Stirling PDF
      - UI_HOMEDESCRIPTION=PDF Editing
      - UI_LOGOSTYLE=modern
      - UI_LANGUAGES=en_US
      - UI_DEFAULTHIDEUNAVAILABLETOOLS=true
      - UI_DEFAULTHIDEUNAVAILABLECONVERSIONS=true
      - UI_HIDE_DISABLED_TOOLS_GOOGLEDRIVE=true
      - UI_HIDE_DISABLED_TOOLS_MOBILEQRSCANNER=true

      - SECURITY_ENABLELOGIN=false
      - SECURITY_INITIALLOGIN_USERNAME=${GLOBAL_USERNAME}
      - SECURITY_INITIALLOGIN_PASSWORD=${GLOBAL_PASSWORD}

      - LEGAL_TERMSANDCONDITIONS=""
      - LEGAL_PRIVACYPOLICY=""
      - LEGAL_ACCESSIBILITYSTATEMENT=""
      - LEGAL_COOKIEPOLICY=""
      - LEGAL_IMPRESSUM=""

      - METRICS_ENABLED=false
      - STORAGE_ENABLED=false
    networks:
      - infra_gw-internal
    volumes:
      - stirling-logs:/logs
      - stirling-configs:/configs
      - stirling-pipeline:/pipeline
      - stirling-tessdata:/usr/share/tessdata
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080$${SYSTEM_ROOTURIPATH:-''}/api/v1/info/status | grep -q 'UP'"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      <<: [*place-vm, *deploy]
      update_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.stirling-pdf.rule=Host(`pdf.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.stirling-pdf.entrypoints=websecure"
        - "traefik.http.services.stirling-pdf.loadbalancer.server.port=8080"
        - "homepage.group=Applications"
        - "homepage.name=Stirling-PDF"
        - "homepage.icon=stirling-pdf"
        - "homepage.href=https://pdf.${DOMAIN_PRIVATE}"
        - "homepage.description=PDF Management and Processing"
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 512M

volumes:
  stirling-logs:
  stirling-configs:
  stirling-pipeline:
  stirling-tessdata:

networks:
  infra_gw-internal:
    external: true
