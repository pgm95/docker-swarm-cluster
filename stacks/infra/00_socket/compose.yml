# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    logging:
      <<: *logging
    stop_grace_period: 30s
    environment:
      EVENTS: 1
      VERSION: 1
      PING: 1
      POST: 0
      CONFIGS: 1
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      SECRETS: 1
      SERVICES: 1
      SWARM: 1
      SYSTEM: 1
      TASKS: 1
      VOLUMES: 1
      NODES: 1
      INFO: 1
    networks:
      - infra_socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run
      - /usr/local/etc/haproxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:2375/_ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      <<: *deploy
      update_config:
        order: start-first
      placement:
        constraints:
          - node.role == manager
          - node.labels.type == vm
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-tiny

networks:
  infra_socket:
    external: true
