#:schema https://mise.jdx.dev/schema/mise-task.json

["site:deploy-infra"]
alias = "infra"
description = "Deploy infrastructure stacks in order"
depends = ["swarm:init-networks"]
run = 'python3 -m swarm.site deploy-infra'

["site:deploy-apps"]
alias = "apps"
description = "Deploy all application stacks"
run = 'python3 -m swarm.site deploy-apps'

["site:drain"]
description = "Remove all stacks in reverse order"
confirm = "This will remove ALL stacks, secrets, configs, and networks. Continue?"
depends_post = ["swarm:cleanup"]
run = 'python3 -m swarm.site drain'

["site:registry"]
description = "Login all swarm nodes to the private registry"
usage = 'flag "--local" help="Also login the local dev machine"'
run = 'python3 -m swarm.registry_auth'
