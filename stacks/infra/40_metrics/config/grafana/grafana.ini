[server]
root_url = https://grafana.${DOMAIN_PRIVATE}

[security]
secret_key = $__file{/run/secrets/grafana_secret_key}
cookie_secure = true
cookie_samesite = lax

[log]
mode = console
level = info

[database]
type = postgres
host = postgres:5432
name = grafana
user = grafana
password = $__file{/run/secrets/grafana_postgres_password}
ssl_mode = disable

[plugins]
preinstall = grafana-clock-panel

[auth.generic_oauth]
enabled = true
name = Authentik
icon = signin
client_id = $__file{/run/secrets/grafana_oidc_client}
client_secret = $__file{/run/secrets/grafana_oidc_secret}
scopes = openid profile email groups
empty_scopes = false
auth_url = https://${OIDC_URL}/application/o/authorize/
token_url = https://${OIDC_URL}/application/o/token/
api_url = https://${OIDC_URL}/application/o/userinfo/
login_attribute_path = preferred_username
email_attribute_path = email
groups_attribute_path = groups
role_attribute_path = contains(groups[*], '${GLOBAL_ADMIN_GROUP}') && 'GrafanaAdmin' || 'Viewer'
allow_assign_grafana_admin = true
name_attribute_path = name
use_pkce = true
auto_login = true
