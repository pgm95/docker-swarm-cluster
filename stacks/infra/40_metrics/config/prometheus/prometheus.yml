# Prometheus Configuration (Swarm)
global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

alerting:
  alertmanagers:
  - static_configs:
    - targets: []
    scheme: http
    timeout: 10s
    api_version: v2

rule_files:
  - "node_rules.yml"

scrape_configs:
  # Self-monitoring
  - job_name: prometheus
    honor_timestamps: true
    static_configs:
      - targets:
        - localhost:9090

  # Traefik metrics (external gateway)
  - job_name: traefik-external
    static_configs:
      - targets:
        - traefik-external:9091

  # Traefik metrics (internal gateway)
  - job_name: traefik-internal
    static_configs:
      - targets:
        - traefik-internal:9091

  # CrowdSec metrics (external gateway)
  - job_name: crowdsec
    static_configs:
      - targets:
        - crowdsec:6060

  # Loki metrics (logging stack)
  - job_name: loki
    static_configs:
      - targets:
        - loki:3100

  # Alloy metrics (logging stack, global — one instance per node)
  - job_name: alloy
    dockerswarm_sd_configs:
      - host: http://socket-proxy:2375
        role: tasks
        port: 12345
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: logging_alloy
        action: keep
      - source_labels: [__meta_dockerswarm_task_desired_state]
        regex: running
        action: keep
      - source_labels: [__meta_dockerswarm_network_name]
        regex: infra_metrics
        action: keep
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance

  # Node Exporter metrics (metrics stack, global — one instance per node)
  - job_name: node
    dockerswarm_sd_configs:
      - host: http://socket-proxy:2375
        role: tasks
        port: 9100
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: metrics_node-exporter
        action: keep
      - source_labels: [__meta_dockerswarm_task_desired_state]
        regex: running
        action: keep
      - source_labels: [__meta_dockerswarm_network_name]
        regex: infra_metrics
        action: keep
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance

  # Registry metrics (infra/registry)
  - job_name: registry
    metrics_path: /metrics
    static_configs:
      - targets:
        - registry:5001

  # Syncthing metrics (apps/syncthing)
  - job_name: syncthing
    metrics_path: /metrics
    bearer_token_file: /run/secrets/syncthing_api_key
    static_configs:
      - targets:
        - syncthing:8384

  # cAdvisor metrics (metrics stack, global — one instance per node)
  - job_name: cadvisor
    dockerswarm_sd_configs:
      - host: http://socket-proxy:2375
        role: tasks
        port: 8080
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: metrics_cadvisor
        action: keep
      - source_labels: [__meta_dockerswarm_task_desired_state]
        regex: running
        action: keep
      - source_labels: [__meta_dockerswarm_network_name]
        regex: infra_metrics
        action: keep
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance

  # Uptime Kuma metrics
  # Requires WebUI credentials or API key
  # Once API key is created, basic_auth login is permanently disabled.
  # Metrics: monitor_status, monitor_response_time, monitor_cert_days_remaining
  # - job_name: uptime-kuma
  #   scrape_interval: 30s
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets:
  #       - uptime-kuma:3001
  #   basic_auth:
  #     username: "" # Leave blank if using API key
  #     password_file: /run/secrets/uptime_kuma_api_key_or_password
