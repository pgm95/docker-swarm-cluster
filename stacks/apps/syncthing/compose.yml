# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

# Port 22000 open on host for peer discovery

services:
  syncthing:
    image: syncthing/syncthing:latest
    logging:
      <<: *logging
    stop_grace_period: 30s
    environment:
      - PUID=${GLOBAL_NONROOT_PUID}
      - PGID=${GLOBAL_NONROOT_PGID}
      - STGUIAPIKEY=${SYNCTHING_API_KEY}
    networks:
      - infra_gw-internal
      - infra_metrics
    ports:
      # Sync protocol - must be host mode for peer discovery
      - target: 22000
        published: 22000
        protocol: tcp
        mode: host
      - target: 22000
        published: 22000
        protocol: udp
        mode: host
    volumes:
      - syncthing-data:/var/syncthing
      - /mnt/personal:/mnt/personal
      - /mnt/archive:/mnt/archive
      - /mnt/apple:/mnt/apple:ro
      - /mnt/photos:/mnt/photos
      - /mnt/media:/mnt/media
    healthcheck:
      test: ["CMD", "curl", "-fkLsS", "-m", "2", "http://127.0.0.1:8384/rest/noauth/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      <<: [*place-storage, *deploy-stop-first]
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.syncthing.rule=Host(`sync.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.syncthing.entrypoints=websecure"
        - "traefik.http.services.syncthing.loadbalancer.server.port=8384"
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  syncthing-data:

networks:
  infra_gw-internal:
    external: true
  infra_metrics:
    external: true
