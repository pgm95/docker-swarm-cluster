# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json

version: 1
metadata:
  name: Brand Configuration
  labels:
    blueprints.goauthentik.io/instantiate: "true"

entries:
  # default_application determines WebFinger OIDC issuer href.
  # WebFinger consumer application must match the provider's issuer.
  # Usually only needed once at initial OIDC discovery.
  # There can only be one default_application at a time.
  - model: authentik_brands.brand
    state: present
    identifiers:
      default: true
    attrs:
      domain: authentik-default
      branding_title: Authentik
      default_application: !Find [authentik_core.application, [slug, tailscale]]
  # Avatar resolution chain (attributes.avatar then initials) is set at first
  # boot via AUTHENTIK_AVATARS on the server/worker. The authentik_tenants.tenant
  # model is not allowed for blueprint manipulation in 2026.2.
