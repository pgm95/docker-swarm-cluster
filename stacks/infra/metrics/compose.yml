# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

include:
  - secrets.yml
  - configs.yml

services:
  prometheus:
    image: prom/prometheus:v3.9.1
    logging: *logging
    stop_grace_period: 30s
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus_rules
        target: /etc/prometheus/node_rules.yml
    networks:
      - infra_metrics
      - infra_gw-internal
    volumes:
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      <<: [*place-vm, *deploy-stop-first]
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-large
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.prometheus.entrypoints=websecure"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
        - "homepage.group=Infrastructure"
        - "homepage.name=Prometheus"
        - "homepage.icon=prometheus"
        - "homepage.href=https://prometheus.${DOMAIN_PRIVATE}"
        - "homepage.description=Metrics Collection"
        - "homepage.widget.type=prometheus"
        - "homepage.widget.url=https://prometheus.${DOMAIN_PRIVATE}"

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.135.0
    entrypoint: ["/bin/sh", "/init.sh"]
    logging: *logging
    stop_grace_period: 30s
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:8428"
    environment:
      VM_OWNER: ${GLOBAL_NONROOT_DOCKER}
    configs:
      - source: victoriametrics_init
        target: /init.sh
    networks:
      - infra_metrics
      - infra_gw-internal
    volumes:
      - victoriametrics-data:/storage
    healthcheck:
      test: ["NONE"]
    deploy:
      <<: [*place-vm, *deploy]
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-large
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.victoria.rule=Host(`victoria.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.victoria.entrypoints=websecure"
        - "traefik.http.services.victoria.loadbalancer.server.port=8428"

  grafana:
    image: grafana/grafana:12.4.0
    logging: *logging
    stop_grace_period: 30s
    environment:
      DOMAIN_PRIVATE: ${DOMAIN_PRIVATE}
      OIDC_URL: ${GLOBAL_OIDC_URL}
    secrets:
      - grafana_oidc_client
      - grafana_oidc_secret
      - grafana_postgres_password
    configs:
      - source: grafana_ini
        target: /etc/grafana/grafana.ini
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/datasource.yml
    networks:
      - infra_metrics
      - infra_gw-internal
      - infra_postgres
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      <<: [*place-vm, *deploy]
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-medium
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
        - "homepage.group=Infrastructure"
        - "homepage.name=Grafana"
        - "homepage.icon=grafana"
        - "homepage.href=https://grafana.${DOMAIN_PRIVATE}"
        - "homepage.description=Dashboards & Visualization"
        - "homepage.widget.type=grafana"
        - "homepage.widget.url=https://grafana.${DOMAIN_PRIVATE}"

  uptime-kuma:
    image: louislam/uptime-kuma:2-slim-rootless
    logging: *logging
    stop_grace_period: 30s
    networks:
      - infra_metrics
      - infra_gw-internal
      - infra_socket
    volumes:
      - uptimekuma-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      <<: [*place-vm, *deploy-stop-first]
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-medium
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.uptime.rule=Host(`status.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.uptime.entrypoints=websecure"
        - "traefik.http.services.uptime.loadbalancer.server.port=3001"
        - "homepage.group=Infrastructure"
        - "homepage.name=Uptime Kuma"
        - "homepage.icon=uptime-kuma"
        - "homepage.href=https://status.${DOMAIN_PRIVATE}"
        - "homepage.description=Status & Monitoring"
        - "homepage.widget.type=uptimekuma"
        - "homepage.widget.url=https://status.${DOMAIN_PRIVATE}"

  init-db:
    image: postgres:17-alpine
    entrypoint: ["/bin/sh", "/init-db-entrypoint.sh"]
    logging: *logging
    stop_grace_period: 30s
    environment:
      PROVISIONER_USER: ${GLOBAL_POSTGRES_PROVISIONER_USER}
      PROVISIONER_PASSWORD: ${GLOBAL_POSTGRES_PROVISIONER_PASSWORD}
      GRAFANA_POSTGRES_PASSWORD: ${GRAFANA_POSTGRES_PASSWORD}
    configs:
      - source: init_db_entrypoint
        target: /init-db-entrypoint.sh
    networks:
      - infra_postgres
    healthcheck:
      test: ["NONE"]
    deploy:
      <<: [*place-vm, *deploy]
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-tiny

volumes:
  prometheus-data:
  victoriametrics-data:
  grafana-data:
  uptimekuma-data:

networks:
  infra_metrics:
    external: true
  infra_gw-internal:
    external: true
  infra_socket:
    external: true
  infra_postgres:
    external: true
