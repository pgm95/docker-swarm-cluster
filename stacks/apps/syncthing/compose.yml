# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  syncthing:
    image: syncthing/syncthing:latest
    logging:
      <<: *logging
    stop_grace_period: 30s
    environment:
      - PUID=${GLOBAL_NONROOT_PUID}
      - PGID=${GLOBAL_NONROOT_PGID}
      - STGUIAPIKEY=${SYNCTHING_API_KEY}
    networks:
      - infra_gw-internal
      - infra_metrics
    ports:
      - target: 22000
        published: 22000
        protocol: tcp
        mode: host
      - target: 22000
        published: 22000
        protocol: udp #quic
        mode: host
    volumes:
      - syncthing-data:/var/syncthing
      - /mnt/personal:/mnt/personal
      - /mnt/photos:/mnt/photos
    healthcheck:
      test: ["CMD", "curl", "-fkLsS", "-m", "2", "http://127.0.0.1:8384/rest/noauth/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      <<: [*place-storage, *deploy]
      update_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.syncthing.rule=Host(`syncthing.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.syncthing.entrypoints=websecure"
        - "traefik.http.services.syncthing.loadbalancer.server.port=8384"
        - "homepage.group=Applications"
        - "homepage.name=Syncthing"
        - "homepage.icon=syncthing"
        - "homepage.href=https://syncthing.${DOMAIN_PRIVATE}"
        - "homepage.description=File Synchronization"
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-large

volumes:
  syncthing-data:

networks:
  infra_gw-internal:
    external: true
  infra_metrics:
    external: true
