#:schema https://mise.jdx.dev/schema/mise-task.json
#:tombi schema.strict = false

["site:deploy"]
description = "Deploy all stacks"
depends = ["site:deploy-infra"]
run = [{ task = "site:deploy-apps" }]
depends_post = ["swarm:status"]

["site:deploy-infra"]
alias = "infra"
description = "Deploy infrastructure stacks in order"
depends = ["swarm:init-networks"]
run = [
  "mise run swarm:deploy stacks/infra/socket",
  "mise run swarm:deploy stacks/infra/postgres",
  "mise run swarm:deploy stacks/infra/backup",
  "mise run swarm:deploy stacks/infra/gateway-internal",
  "mise run swarm:deploy stacks/infra/gateway-external",
  "mise run swarm:deploy stacks/infra/metrics",
  "mise run swarm:deploy stacks/infra/registry",
  "mise run swarm:deploy stacks/infra/accounts",
]

["site:deploy-apps"]
alias = "apps"
description = "Deploy all application stacks"
run = '''{% raw %}
#!/usr/bin/env bash
mapfile -t STACKS < <(find stacks/apps -mindepth 1 -maxdepth 1 -type d | sort)
failed=()
skipped=0
echo "=== Apps Deploy ==="
echo "Stacks: ${#STACKS[@]}"
echo ""
for stack in "${STACKS[@]}"; do
    if [[ -f "${stack}/.nodeploy" ]]; then
        echo "━━━ $(basename "${stack}") ━━━"
        echo "SKIP (.nodeploy)"
        ((skipped++))
        echo ""
        continue
    fi
    echo "━━━ $(basename "${stack}") ━━━"
    if ! mise run swarm:deploy "${stack}"; then
        echo "FAILED: $(basename "${stack}")"
        failed+=("$(basename "${stack}")")
    fi
    sleep 5
    echo ""
done
summary="deployed $(( ${#STACKS[@]} - skipped - ${#failed[@]} ))"
[[ ${skipped} -gt 0 ]] && summary+=", skipped ${skipped}"
[[ ${#failed[@]} -gt 0 ]] && summary+=", failed ${#failed[@]}: ${failed[*]}"
echo "=== Apps deploy complete (${summary}) ==="
[[ ${#failed[@]} -eq 0 ]]
{% endraw %}'''

["site:reset"]
description = "Remove all stacks in reverse order"
usage = 'flag "--volumes" help="Also remove all named volumes from nodes"'
confirm = "This will remove ALL stacks, secrets, configs, and networks. Continue?"
depends_post = ["swarm:cleanup"]
run = '''{% raw %}
#!/usr/bin/env bash
source .mise/tasks/scripts/resolve-networks.sh
INFRA_STACKS=(
    stacks/infra/accounts
    stacks/infra/registry
    stacks/infra/metrics
    stacks/infra/gateway-external
    stacks/infra/gateway-internal
    stacks/infra/backup
    stacks/infra/postgres
    stacks/infra/socket
)
echo "--- Removing app stacks ---"
for stack in $(find stacks/apps -mindepth 1 -maxdepth 1 -type d | sort); do
    mise run swarm:remove "${stack}"
done
echo ""
echo "--- Removing infra stacks ---"
for stack in "${INFRA_STACKS[@]}"; do
    mise run swarm:remove "${stack}"
done
if [[ "${usage_volumes}" == "true" ]]; then
    source .mise/tasks/scripts/resolve-nodes.sh
    echo ""
    echo "--- Removing volumes ---"
    mapfile -t nodes < <(get_swarm_nodes | cut -f1)
    for node in "${nodes[@]}"; do
        pruned=$(ssh_node "${node}" "docker volume prune -af" 2>/dev/null)
        count=$(echo "${pruned}" | grep -c '^[a-f0-9]' || true)
        echo "  ${node}: ${count} removed"
    done
fi
echo ""
echo "--- Removing overlay networks ---"
while IFS= read -r net; do
    [[ -z "${net}" ]] && continue
    if docker network rm "${net}" >/dev/null 2>&1; then
        echo "  removed: ${net}"
    else
        echo "  skipped: ${net} (not found or in use)"
    fi
done < <(get_infra_networks)
{% endraw %}'''
