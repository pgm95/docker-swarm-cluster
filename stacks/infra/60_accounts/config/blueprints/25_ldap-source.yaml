# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json

version: 1
metadata:
  name: LDAP Source
  labels:
    blueprints.goauthentik.io/instantiate: "true"

entries:
  # --- User property mappings ---

  - model: authentik_sources_ldap.ldapsourcepropertymapping
    id: lldap-user-name
    state: present
    identifiers:
      managed: custom/lldap-user-name
    attrs:
      name: lldap User Name
      expression: |
        return {"name": list_flatten(ldap.get("displayName") or ldap.get("cn"))}

  - model: authentik_sources_ldap.ldapsourcepropertymapping
    id: lldap-user-attrs
    state: present
    identifiers:
      managed: custom/lldap-user-attrs
    attrs:
      name: lldap User Attributes
      expression: |
        attrs = {}
        gn = list_flatten(ldap.get("givenName"))
        sn = list_flatten(ldap.get("sn"))
        if gn: attrs["givenName"] = gn
        if sn: attrs["sn"] = sn
        return {"attributes": attrs} if attrs else {}

  - model: authentik_sources_ldap.ldapsourcepropertymapping
    id: lldap-user-avatar
    state: present
    identifiers:
      managed: custom/lldap-user-avatar
    attrs:
      name: lldap User Avatar
      expression: |
        import base64
        photo = ldap.get("jpegPhoto")
        if not photo:
            return {}
        b = photo[0] if isinstance(photo, list) else photo
        if not isinstance(b, (bytes, bytearray)):
            return {}
        return {"attributes": {"avatar": "data:image/jpeg;base64," + base64.b64encode(b).decode("ascii")}}

  # --- Group property mappings ---

  - model: authentik_sources_ldap.ldapsourcepropertymapping
    id: lldap-group-name
    state: present
    identifiers:
      managed: custom/lldap-group-name
    attrs:
      name: lldap Group Name
      expression: |
        return {"name": list_flatten(ldap.get("cn"))}

  # --- LDAP Source ---

  - model: authentik_sources_ldap.ldapsource
    id: source-lldap
    state: present
    identifiers:
      slug: lldap
    attrs:
      name: lldap
      enabled: true
      server_uri: ldap://lldap:389
      start_tls: false
      base_dn: !Env GLOBAL_LDAP_BASE_DN
      bind_cn: !Format ["uid=_bind_authentik,ou=people,%s", !Env GLOBAL_LDAP_BASE_DN]
      bind_password: !File /run/secrets/authentik_bind_pass

      additional_user_dn: ou=people
      additional_group_dn: ou=groups

      user_object_filter: (objectClass=person)
      group_object_filter: (objectClass=groupOfUniqueNames)
      user_membership_attribute: distinguishedName
      group_membership_field: member
      object_uniqueness_field: entryUUID
      lookup_groups_from_user: false

      sync_users: true
      sync_groups: true
      sync_users_password: true
      password_login_update_internal_password: true
      delete_not_found_objects: false

      user_matching_mode: username_link
      group_matching_mode: identifier

      user_property_mappings:
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, "goauthentik.io/sources/ldap/openldap-uid"]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, "goauthentik.io/sources/ldap/default-mail"]]
        - !Find [authentik_sources_ldap.ldapsourcepropertymapping, [managed, "goauthentik.io/sources/ldap/default-dn-path"]]
        - !KeyOf lldap-user-name
        - !KeyOf lldap-user-attrs
        - !KeyOf lldap-user-avatar
      group_property_mappings:
        - !KeyOf lldap-group-name
