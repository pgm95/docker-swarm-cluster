# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

include:
  - configs.yml

services:
  pinchflat:
    image: keglin/pinchflat:latest
    entrypoint: ["/bin/sh", "/init.sh"]
    logging:
      <<: *logging
    stop_grace_period: 30s
    environment:
      - PINCHFLAT_OWNER=${GLOBAL_NONROOT_DOCKER}
      - LOG_LEVEL=info
    configs:
      - source: pinchflat_init
        target: /init.sh
    networks:
      - infra_gw-internal
    volumes:
      - pinchflat-data:/config
      - /mnt/media:/downloads
    deploy:
      <<: [*place-storage, *deploy]
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.pinchflat.rule=Host(`youtube.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.pinchflat.entrypoints=websecure"
        - "traefik.http.services.pinchflat.loadbalancer.server.port=8945"
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  pinchflat-data:

networks:
  infra_gw-internal:
    external: true
