[server]
root_url = https://grafana.${DOMAIN_PRIVATE}
http_port = 3009

[log]
level = info

[paths]
provisioning = /etc/grafana/provisioning
config = /etc/grafana/grafana.ini
data = /var/lib/grafana

[plugins]
preinstall = grafana-clock-panel victoriametrics-metrics-datasource grafana-lenav-panel

[auth.generic_oauth]
enabled = true
name = Authelia
icon = signin
client_id = $__file{/run/secrets/grafana_oidc_client}
client_secret = $__file{/run/secrets/grafana_oidc_secret}
scopes = openid profile email groups
empty_scopes = false
auth_url = https://${OIDC_URL}/api/oidc/authorization
token_url = https://${OIDC_URL}/api/oidc/token
api_url = https://${OIDC_URL}/api/oidc/userinfo
login_attribute_path = preferred_username
groups_attribute_path = groups
name_attribute_path = name
use_pkce = true
role_attribute_path =
auto_login = true
