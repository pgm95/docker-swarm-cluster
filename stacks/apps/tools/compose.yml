# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  it-tools:
    image: corentinth/it-tools:latest
    logging:
      <<: *logging
    stop_grace_period: 30s
    networks:
      - infra_gw-internal
    deploy:
      <<: [*place-vm, *deploy]
      update_config:
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.it-tools.rule=Host(`it-tools.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.it-tools.entrypoints=websecure"
        - "traefik.http.services.it-tools.loadbalancer.server.port=80"
        - "homepage.group=Applications"
        - "homepage.name=IT Tools"
        - "homepage.icon=it-tools"
        - "homepage.href=https://it-tools.${DOMAIN_PRIVATE}"
        - "homepage.description=Tools for various tasks"
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-medium

  cyberchef:
    image: ghcr.io/gchq/cyberchef:latest
    logging:
      <<: *logging
    stop_grace_period: 30s
    networks:
      - infra_gw-internal
    deploy:
      <<: [*place-vm, *deploy]
      update_config:
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.cyberchef.rule=Host(`cyberchef.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.cyberchef.entrypoints=websecure"
        - "traefik.http.services.cyberchef.loadbalancer.server.port=80"
        - "homepage.group=Applications"
        - "homepage.name=CyberChef"
        - "homepage.icon=cyberchef"
        - "homepage.href=https://cyberchef.${DOMAIN_PRIVATE}"
        - "homepage.description=Data Analysis and Transformation"
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-medium

networks:
  infra_gw-internal:
    external: true
