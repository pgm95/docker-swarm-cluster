# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

include:
  - secrets.yml
  - configs.yml

services:
  prometheus:
    image: prom/prometheus:v3.9.1
    logging:
      <<: *logging
    stop_grace_period: 30s
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    secrets:
      - syncthing_api_key
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus_rules
        target: /etc/prometheus/node_rules.yml
    networks:
      - infra_metrics
      - infra_gw-internal
      - infra_socket
    volumes:
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      <<: [*place-vm, *deploy]
      update_config:
        order: stop-first
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-large
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.prometheus.entrypoints=websecure"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
        - "homepage.group=Infrastructure"
        - "homepage.name=Prometheus"
        - "homepage.icon=prometheus"
        - "homepage.href=https://prometheus.${DOMAIN_PRIVATE}"
        - "homepage.description=Metrics Collection"
        - "homepage.widget.type=prometheus"
        - "homepage.widget.url=http://prometheus:9090"

  node-exporter:
    image: prom/node-exporter:v1.10.2
    logging:
      <<: *logging
    stop_grace_period: 30s
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+)($|/)"
      - "--collector.filesystem.fs-types-exclude=^(tmpfs|overlay|nsfs|tracefs|cgroup2?)$"
      - "--no-collector.hwmon"
      - "--no-collector.bcache"
      - "--no-collector.infiniband"
    networks:
      - infra_metrics
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    healthcheck:
      test: ["CMD", "/bin/wget", "-q", "--spider", "http://127.0.0.1:9100/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      <<: *deploy
      update_config:
        order: start-first
      mode: global
      resources:
        <<: *resources-tiny

  grafana:
    image: grafana/grafana:12.4.0
    logging:
      <<: *logging
    stop_grace_period: 30s
    environment:
      DOMAIN_PRIVATE: ${DOMAIN_PRIVATE}
      OIDC_URL: ${GLOBAL_OIDC_URL}
      GLOBAL_ADMIN_GROUP: ${GLOBAL_ADMIN_GROUP}
    secrets:
      - grafana_oidc_client
      - grafana_oidc_secret
      - grafana_postgres_password
      - grafana_secret_key
    configs:
      - source: grafana_ini
        target: /etc/grafana/grafana.ini
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/datasource.yml
      - source: grafana_dashboards_provisioner
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
      - source: grafana_dashboard_crowdsec_prom
        target: /etc/grafana/dashboards/crowdsec-prom.json
      - source: grafana_dashboard_crowdsec_loki
        target: /etc/grafana/dashboards/crowdsec-loki.json
      - source: grafana_dashboard_traefik
        target: /etc/grafana/dashboards/traefik-standalone.json
      - source: grafana_dashboard_syncthing
        target: /etc/grafana/dashboards/syncthing-metrics.json
      - source: grafana_dashboard_borgmatic
        target: /etc/grafana/dashboards/borgamatic-logs.json
      - source: grafana_dashboard_uptimekuma
        target: /etc/grafana/dashboards/uptime-kuma.json
      - source: grafana_dashboard_registry
        target: /etc/grafana/dashboards/docker-registry.json
      - source: grafana_dashboard_node_exporter
        target: /etc/grafana/dashboards/node-exporter.json
      - source: grafana_dashboard_cadvisor
        target: /etc/grafana/dashboards/cadvisor-overview.json
    networks:
      - infra_metrics
      - infra_gw-internal
      - infra_postgres
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      <<: [*place-vm, *deploy]
      update_config:
        order: stop-first
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-medium
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
        - "homepage.group=Infrastructure"
        - "homepage.name=Grafana"
        - "homepage.icon=grafana"
        - "homepage.href=https://grafana.${DOMAIN_PRIVATE}"
        - "homepage.description=Dashboards & Visualization"
        # - "homepage.widget.type=grafana"
        # - "homepage.widget.version=2"
        # - "homepage.widget.url=https://grafana.${DOMAIN_PRIVATE}"
        # - "homepage.widget.username={{HOMEPAGE_VAR_GRAFANA_USER}}"
        # - "homepage.widget.password={{HOMEPAGE_VAR_GRAFANA_PASS}}"

  init-db:
    image: postgres:17-alpine
    entrypoint: ["/bin/sh", "/init-db-entrypoint.sh"]
    logging:
      <<: *logging
    stop_grace_period: 30s
    environment:
      PROVISIONER_USER: ${GLOBAL_POSTGRES_PROVISIONER_USER}
      PROVISIONER_PASSWORD: ${GLOBAL_POSTGRES_PROVISIONER_PASSWORD}
      GRAFANA_POSTGRES_PASSWORD: ${GRAFANA_POSTGRES_PASSWORD}
    configs:
      - source: init_db_entrypoint
        target: /init-db-entrypoint.sh
    networks:
      - infra_postgres
    healthcheck:
      test: ["NONE"]
    deploy:
      <<: [*place-vm, *deploy-init]
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-tiny

volumes:
  prometheus-data:
  grafana-data:

networks:
  infra_metrics:
    external: true
  infra_gw-internal:
    external: true
  infra_socket:
    external: true
  infra_postgres:
    external: true
