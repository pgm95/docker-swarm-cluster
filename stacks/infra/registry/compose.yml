# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

# Run 'mise run registry:auth' after deploy to login all nodes
# REGISTRY_HTTP_SECRET: env var injection (no _FILE support)

include:
  - secrets.yml
  - configs.yml

services:
  registry:
    image: registry:3
    entrypoint: ["/bin/sh", "/init.sh"]
    logging: *logging
    stop_grace_period: 30s
    environment:
      REGISTRY_OWNER: ${GLOBAL_NONROOT_DOCKER}
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: Registry Realm
      REGISTRY_AUTH_HTPASSWD_PATH: /run/secrets/registry_htpasswd
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_SECRET: ${REGISTRY_HTTP_SECRET}
      REGISTRY_LOG_LEVEL: info
      OTEL_TRACES_EXPORTER: none
    secrets:
      - registry_htpasswd
    configs:
      - source: registry_init
        target: /init.sh
    networks:
      - infra_gw-internal
    volumes:
      - registry-data:/var/lib/registry
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:5001/debug/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      <<: [*place-vm, *deploy]
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.registry.rule=Host(`registry.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.registry.entrypoints=websecure"
        - "traefik.http.services.registry.loadbalancer.server.port=5000"
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  registry-data:

networks:
  infra_gw-internal:
    external: true
