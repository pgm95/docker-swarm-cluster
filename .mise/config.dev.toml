#:schema https://mise.jdx.dev/schema/mise.json

[env]
_.file = { path = "{{ env.PROJECT_SECRETS_DIR }}/dev.yaml", redact = true }

SWARM_NODE_DEFAULT = "swarm-vm-dev"
SWARM_SSH_USER = "root"
DOCKER_HOST = "ssh://{{ env.SWARM_SSH_USER }}@{{ env.SWARM_NODE_DEFAULT }}"

GLOBAL_SWARM_OCI_REGISTRY = "registry.{{ env.DOMAIN_PRIVATE }}"
GLOBAL_ACME_CA_SERVER = "https://acme-v02.api.letsencrypt.org/directory"
# GLOBAL_ACME_CA_SERVER = "https://acme-staging-v02.api.letsencrypt.org/directory"
