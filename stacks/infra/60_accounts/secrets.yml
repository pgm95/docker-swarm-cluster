secrets:
  # Core Authentik secrets (versioned)
  authentik_secret_key:
    name: authentik_secret_key_${DEPLOY_VERSION}
    external: true
  authentik_postgres_password:
    name: authentik_postgres_password_${DEPLOY_VERSION}
    external: true

  # Shared secrets (versioned, from GLOBAL_SECRETS)
  smtp_pass:
    name: global_smtp_pass_${DEPLOY_VERSION}
    external: true
  global_password:
    name: global_password_${DEPLOY_VERSION}
    external: true

  # LDAP (versioned)
  authentik_outpost_token:
    name: authentik_outpost_token_${DEPLOY_VERSION}
    external: true
  authentik_ldap_bind_password:
    name: authentik_ldap_bind_password_${DEPLOY_VERSION}
    external: true

  # OIDC client secrets (versioned)
  oidc_client_secret_paperless:
    name: oidc_client_secret_paperless_${DEPLOY_VERSION}
    external: true
  oidc_client_secret_mealie:
    name: oidc_client_secret_mealie_${DEPLOY_VERSION}
    external: true
  oidc_client_secret_dawarich:
    name: oidc_client_secret_dawarich_${DEPLOY_VERSION}
    external: true
  oidc_client_secret_quantum:
    name: oidc_client_secret_quantum_${DEPLOY_VERSION}
    external: true
  oidc_client_secret_immich:
    name: oidc_client_secret_immich_${DEPLOY_VERSION}
    external: true
  oidc_client_secret_portainer:
    name: oidc_client_secret_portainer_${DEPLOY_VERSION}
    external: true
  oidc_client_secret_grafana:
    name: oidc_client_secret_grafana_${DEPLOY_VERSION}
    external: true
  oidc_client_secret_tailscale:
    name: oidc_client_secret_tailscale_${DEPLOY_VERSION}
    external: true
