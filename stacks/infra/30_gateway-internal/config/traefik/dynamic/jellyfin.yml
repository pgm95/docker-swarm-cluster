---
# yaml-language-server: $schema=https://json.schemastore.org/traefik-v3-file-provider.json

http:
  routers:
    jellyfin:
      rule: 'Host(`stream.{{ env "DOMAIN_PRIVATE" }}`)'
      entryPoints:
        - websecure
      service: jellyfin

  services:
    jellyfin:
      loadBalancer:
        servers:
          - url: http://mediaserver.home.arpa:8096
