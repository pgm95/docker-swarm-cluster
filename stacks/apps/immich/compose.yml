# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

include:
  - secrets.yml
  - configs.yml

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    entrypoint: ["/bin/sh", "/init.sh"]
    logging:
      <<: *logging
    stop_grace_period: 30s
    environment:
      - IMMICH_OWNER=${GLOBAL_NONROOT_DOCKER}
      - AMD_VISIBLE_DEVICES=all
      - REDIS_HOSTNAME=valkey
      - DB_HOSTNAME=database
      - DB_USERNAME=postgres
      - DB_DATABASE_NAME=immich
      - DB_PASSWORD_FILE=/run/secrets/db_password
      # - IMMICH_IGNORE_MOUNT_CHECK_ERRORS=true
      # - CREDENTIALS_DIRECTORY=/run/secrets
    secrets:
      - db_password
    configs:
      - source: immich_server_init
        target: /init.sh
    networks:
      - default
      - infra_gw-internal
    # Originals on the bulk share at /data; cache subdirs overlay as subpath mounts of
    # server-data to keep generated content off the share. Subpaths need precreation.
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/photos/immich:/data
      - /mnt/photos/archive:/external/archive
      - /mnt/photos/wedding:/external/wedding
      - type: volume
        source: server-data
        target: /data/thumbs
        volume:
          subpath: thumbs
      - type: volume
        source: server-data
        target: /data/encoded-video
        volume:
          subpath: encoded-video
      - type: volume
        source: server-data
        target: /data/profile
        volume:
          subpath: profile
      - type: volume
        source: server-data
        target: /data/backups
        volume:
          subpath: backups
    healthcheck:
      disable: false
      start_period: 120s
      interval: 30s
    deploy:
      <<: [*place-gpu, *deploy]
      update_config:
        order: stop-first
      endpoint_mode: dnsrr
      labels:
        - "traefik.enable=true"
        - "traefik.scope.internal=true"
        - "traefik.http.routers.immich.rule=Host(`immich.${DOMAIN_PRIVATE}`)"
        - "traefik.http.routers.immich.entrypoints=websecure"
        - "traefik.http.services.immich.loadbalancer.server.port=2283"
        - "homepage.group=Media"
        - "homepage.name=Immich"
        - "homepage.icon=immich"
        - "homepage.href=https://immich.${DOMAIN_PRIVATE}"
        - "homepage.description=Photo Management"
        - "homepage.widget.type=immich"
        - "homepage.widget.version=2"
        - "homepage.widget.url=https://immich.${DOMAIN_PRIVATE}"
        - "homepage.widget.key={{HOMEPAGE_VAR_IMMICH_KEY}}"
        - 'homepage.widget.fields=["photos", "videos", "storage"]'
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 1024M

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    logging:
      <<: *logging
    stop_grace_period: 30s
    volumes:
      - ml-cache:/cache
    healthcheck:
      disable: false
    deploy:
      <<: [*place-gpu, *deploy]
      update_config:
        order: start-first
      endpoint_mode: dnsrr
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 1024M

  valkey:
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    logging:
      <<: *logging
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      <<: [*place-gpu, *deploy]
      update_config:
        order: stop-first
      endpoint_mode: dnsrr
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-medium

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    logging:
      <<: *logging
    stop_grace_period: 60s
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums
    secrets:
      - db_password
    tmpfs:
      - /dev/shm:size=134217728
    volumes:
      - database-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d immich -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      <<: [*place-gpu, *deploy]
      update_config:
        order: stop-first
      endpoint_mode: dnsrr
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

volumes:
  ml-cache:
  database-data:
  server-data:

networks:
  infra_gw-internal:
    external: true
