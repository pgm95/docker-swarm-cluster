# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

include:
  - secrets.yml
  - configs.yml

services:
  postgres:
    image: postgres:17
    logging: *logging
    stop_grace_period: 60s
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - PROVISIONER_DB_USER=${GLOBAL_POSTGRES_PROVISIONER_USER}
      - PROVISIONER_DB_PASSWORD=${GLOBAL_POSTGRES_PROVISIONER_PASSWORD}
    secrets:
      - postgres_password
    configs:
      - source: postgres_init
        target: /docker-entrypoint-initdb.d/init.sh
    tmpfs:
      - /dev/shm:size=134217728  # 128MiB — Docker defaults to 64MiB, insufficient for PG shared memory
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - infra_postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      <<: [*place-storage, *deploy-stop-first]
      endpoint_mode: dnsrr
      mode: replicated
      replicas: 1
      resources:
        <<: *resources-large

volumes:
  postgres-data:

networks:
  infra_postgres:
    external: true
