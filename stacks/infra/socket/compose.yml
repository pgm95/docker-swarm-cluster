# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

# Socket-proxy for Swarm service discovery
# Primary network: infra_socket (Docker API access)

services:
  socket-proxy:
    # All consumers connect via infra_socket overlay network
    image: tecnativa/docker-socket-proxy:v0.4.2
    logging: *logging
    stop_grace_period: 30s
    environment:
      # Enabled by default
      EVENTS: 1
      VERSION: 1
      PING: 1
      # Read-only access
      POST: 0
      CONFIGS: 1
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      SECRETS: 1
      SERVICES: 1
      SWARM: 1
      SYSTEM: 1
      TASKS: 1
      VOLUMES: 1
      NODES: 1
      INFO: 1
    networks:
      - infra_socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run
      - /usr/local/etc/haproxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:2375/_ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.type == vm
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

networks:
  infra_socket:
    external: true
