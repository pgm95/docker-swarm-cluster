---
# yaml-language-server: $schema=https://json.schemastore.org/traefik-v3-file-provider.json

http:
  routers:
    hass:
      rule: 'Host(`hass.{{ env "DOMAIN_PUBLIC" }}`)'
      entryPoints:
        - websecure
      service: hass
  services:
    hass:
      loadBalancer:
        servers:
          - url: http://hass.home.arpa:8123
